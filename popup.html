<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Site Analyzer Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles/popup.css">
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo-mark">🔍</div>
    <div>
      <h1>Site Analyzer Pro</h1>
    </div>
    <div class="header-right">
      <button id="themeToggle" type="button" title="Switch theme" aria-label="Switch theme">🌙</button>
      <span class="version-tag">v2.0</span>
    </div>
  </div>

  <div class="input-section">
    <div class="input-label">
      <div class="dot"></div>
      Enter URLs (one per line)
    </div>
    <textarea id="linksInput" placeholder="example.com&#10;https://another-site.ru&#10;yetanothersite.net"></textarea>
  </div>

  <div class="controls">
    <button id="analyzeBtn">▶ Start Scan</button>
    <button id="exportBtn">↓ Download CSV</button>
  </div>

  <div class="progress-container" id="progressBox">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="statsBar"></div>

  <div class="filter-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Search by URL or title...">
    </div>
    <select id="filterSelect">
      <option value="all">All results</option>
      <option value="success">✓ Full websites</option>
      <option value="warning">~ Landing pages</option>
      <option value="danger">✗ Parked / Empty</option>
      <option value="error">⚠ Errors</option>
    </select>
  </div>

  <div class="table-wrap">
    <table id="resultsTable">
      <thead>
        <tr>
          <th style="width:5%" data-sort="httpCode">HTTP</th>
          <th style="width:7%" data-sort="responseTime">⏱ Time</th>
          <th style="width:16%" data-sort="url">URL</th>
          <th style="width:7%" data-sort="size">Size</th>
          <th style="width:12%" data-sort="title">Title</th>
          <th style="width:5%" title="Internal links" data-sort="links">🔗 Links</th>
          <th style="width:5%" title="Scripts + CSS + Forms" data-sort="complexity">⚙ Comp.</th>
          <th style="width:5%" title="Word count on page" data-sort="wordCount">📝 Words</th>
          <th style="width:5%" title="Images" data-sort="images">🖼 Img</th>
          <th style="width:5%" title="Navigation links" data-sort="navLinks">🧭 Nav</th>
          <th style="width:10%">CMS / Type</th>
          <th style="width:12%" data-sort="verdict">Verdict</th>
          <th style="width:6%" data-sort="score">Score</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="13">
            <div class="empty-state">
              <div class="icon">📋</div>
              <p>Paste URLs above and click “Start Scan”</p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
<script type="module" src="src/app.js"></script>
</body>
</html>
