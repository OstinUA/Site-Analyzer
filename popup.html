<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <title>Site Analyzer Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Syne:wght@700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #f8fafc;
      --border: #dde3ec;
      --border2: #c8d1de;
      --text: #1a2133;
      --text-muted: #7a8fa8;
      --text-dim: #4a5a72;
      --accent: #2563eb;
      --accent2: #4f46e5;
      --success: #16a34a;
      --warning: #d97706;
      --danger: #dc2626;
      --err: #64748b;
      --mono: 'JetBrains Mono', monospace;
      --head: 'Syne', sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: var(--mono);
      background: var(--bg);
      color: var(--text);
      padding: 20px;
      min-width: 1300px;
    }

    /* Grid texture overlay */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(37,99,235,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(37,99,235,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container { position: relative; z-index: 1; }

    /* ─── HEADER ─────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 20px;
      padding-bottom: 16px;
      border-bottom: 1px solid var(--border);
    }

    .logo-mark {
      width: 38px; height: 38px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
      box-shadow: 0 2px 10px rgba(37,99,235,0.25);
    }

    h1 {
      font-family: var(--head);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: -0.5px;
      color: var(--text);
    }

    .version-tag {
      font-size: 10px;
      font-family: var(--mono);
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border2);
      padding: 2px 7px;
      border-radius: 20px;
      margin-left: auto;
    }

    /* ─── INPUT AREA ─────────────────────────────────────── */
    .input-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 14px;
    }

    .input-label {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-bottom: 1px solid var(--border);
      font-size: 11px;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--accent); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

    textarea {
      width: 100%;
      height: 110px;
      background: transparent;
      border: none;
      outline: none;
      padding: 12px 14px;
      font-family: var(--mono);
      font-size: 12.5px;
      color: var(--text);
      resize: vertical;
      line-height: 1.6;
    }
    textarea::placeholder { color: var(--text-muted); }

    /* ─── CONTROLS ───────────────────────────────────────── */
    .controls {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    button {
      border: none;
      padding: 11px 22px;
      border-radius: 8px;
      cursor: pointer;
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 600;
      transition: all 0.18s;
    }

    #analyzeBtn {
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      flex: 1;
      letter-spacing: 0.03em;
      box-shadow: 0 3px 10px rgba(37,99,235,0.25);
    }
    #analyzeBtn:hover { transform: translateY(-1px); box-shadow: 0 5px 16px rgba(37,99,235,0.35); }
    #analyzeBtn:active { transform: translateY(0); }
    #analyzeBtn:disabled {
      background: var(--border);
      color: var(--text-muted);
      cursor: wait;
      box-shadow: none;
      transform: none;
    }

    #exportBtn {
      background: var(--surface);
      color: var(--success);
      border: 1px solid rgba(22,163,74,0.35);
      display: none;
      padding: 11px 18px;
    }
    #exportBtn:hover { background: rgba(22,163,74,0.07); border-color: var(--success); }

    /* ─── PROGRESS ───────────────────────────────────────── */
    .progress-container {
      width: 100%;
      background: var(--surface2);
      border-radius: 4px;
      margin-bottom: 14px;
      height: 4px;
      overflow: hidden;
      display: none;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
      width: 0%;
      transition: width 0.25s ease;
      box-shadow: 0 0 6px rgba(79,70,229,0.4);
    }

    /* ─── STATS BAR ──────────────────────────────────────── */
    #statsBar {
      display: none;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px 14px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      margin-bottom: 14px;
    }

    .stat-badge {
      font-size: 11px;
      padding: 4px 10px;
      border-radius: 20px;
      font-weight: 600;
    }
    .stat-badge.suc { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
    .stat-badge.wrn { background: #fef3c7; color: #b45309; border: 1px solid #fde68a; }
    .stat-badge.dng { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
    .stat-badge.err { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }

    /* ─── TABLE ──────────────────────────────────────────── */
    .table-wrap {
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }

    table { width: 100%; border-collapse: collapse; font-size: 12.5px; }

    thead { background: var(--surface2); }
    th {
      padding: 10px 12px;
      text-align: left;
      font-size: 10px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
      border-bottom: 1px solid var(--border);
    }

    td {
      padding: 9px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: middle;
      color: var(--text-dim);
    }

    tr:last-child td { border-bottom: none; }
    tr:hover td { background: rgba(37,99,235,0.04); }

    .url-col {
      max-width: 240px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }
    .url-col a {
      text-decoration: none;
      color: var(--accent);
      font-size: 12px;
    }
    .url-col a:hover { text-decoration: underline; }

    .title-cell {
      max-width: 160px;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      font-size: 11.5px;
    }

    .stat-pill {
      background: var(--surface2);
      border: 1px solid var(--border2);
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10px;
      margin-right: 3px;
      display: inline-block;
      color: var(--text-dim);
    }

    /* ─── BADGES ─────────────────────────────────────────── */
    .badge {
      padding: 3px 9px;
      border-radius: 5px;
      font-size: 11px;
      font-weight: 600;
      display: inline-block;
      white-space: nowrap;
    }
    .badge-success { background: #dcfce7; color: #15803d; border: 1px solid #bbf7d0; }
    .badge-warning { background: #fef3c7; color: #b45309; border: 1px solid #fde68a; }
    .badge-danger  { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
    .badge-error   { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; }

    /* ─── SCORE BAR ──────────────────────────────────────── */
    .score-bar-wrap {
      width: 100%;
      height: 3px;
      background: var(--surface2);
      border-radius: 2px;
      margin-top: 5px;
      overflow: hidden;
    }
    .score-bar {
      height: 100%;
      border-radius: 2px;
      transition: width 0.4s ease;
    }

    .detail-tag {
      display: block;
      font-size: 9.5px;
      color: var(--text-muted);
      margin-top: 3px;
    }

    /* ─── EMPTY STATE ────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 40px 20px;
      color: var(--text-muted);
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 10px; opacity: 0.4; }
    .empty-state p { font-size: 12px; }

    /* ─── ROW TINTS BY VERDICT ───────────────────────────── */
    tr.row-success td { background: rgba(22,163,74,0.03); }
    tr.row-warning td { background: rgba(217,119,6,0.03); }
    tr.row-danger  td { background: rgba(220,38,38,0.04); }
    tr.row-error   td { background: rgba(100,116,139,0.04); }
    tr.row-success:hover td { background: rgba(22,163,74,0.07) !important; }
    tr.row-warning:hover td { background: rgba(217,119,6,0.07) !important; }
    tr.row-danger:hover  td { background: rgba(220,38,38,0.07) !important; }
    tr.row-error:hover   td { background: rgba(100,116,139,0.07) !important; }

    /* ─── HTTP CHIP ──────────────────────────────────────── */
    .http-chip {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 700;
      font-family: var(--mono);
      white-space: nowrap;
    }
    .http-ok   { background:#dcfce7; color:#15803d; border:1px solid #bbf7d0; }
    .http-warn { background:#fee2e2; color:#b91c1c; border:1px solid #fecaca; }
    .http-err  { background:#fef3c7; color:#b45309; border:1px solid #fde68a; }
    .http-none { background:#f1f5f9; color:#94a3b8; border:1px solid #e2e8f0; }

    /* ─── RESPONSE TIME CHIP ─────────────────────────────── */
    .rt-chip {
      display: inline-block;
      padding: 2px 7px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 600;
      white-space: nowrap;
    }
    .rt-fast { background:#f0fdf4; color:#15803d; border:1px solid #bbf7d0; }
    .rt-med  { background:#fefce8; color:#854d0e; border:1px solid #fef08a; }
    .rt-slow { background:#fee2e2; color:#b91c1c; border:1px solid #fecaca; }
    .rt-none { background:#f8fafc; color:#94a3b8; border:1px solid #e2e8f0; }

    /* ─── REDIRECT BADGE ─────────────────────────────────── */
    .redir-badge {
      display: inline-block;
      margin-left: 5px;
      padding: 1px 6px;
      border-radius: 3px;
      font-size: 9.5px;
      font-weight: 600;
      background: #eff6ff;
      color: #1d4ed8;
      border: 1px solid #bfdbfe;
      text-decoration: none;
      vertical-align: middle;
    }
    .redir-badge:hover { background: #dbeafe; }

    /* ─── SORT ARROW ─────────────────────────────────────── */
    .sort-arrow { font-size: 9px; opacity: 0.6; }
    th[data-sort]:hover { color: var(--accent); }

    /* ─── FILTER BAR ─────────────────────────────────────── */
    .filter-bar {
      display: flex;
      gap: 8px;
      margin-bottom: 12px;
      align-items: center;
    }
    .search-wrap {
      flex: 1;
      position: relative;
    }
    .search-wrap input {
      width: 100%;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 12px 8px 32px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      outline: none;
      transition: border-color 0.15s;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-wrap input::placeholder { color: var(--text-muted); }
    .search-icon {
      position: absolute;
      left: 10px; top: 50%;
      transform: translateY(-50%);
      font-size: 13px;
      pointer-events: none;
      opacity: 0.45;
    }
    select#filterSelect {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 7px;
      padding: 8px 12px;
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text);
      outline: none;
      cursor: pointer;
    }

    /* ─── METRIC CELLS ───────────────────────────────────── */
    .metric-cell {
      text-align: center;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-dim);
    }
    .metric-cell.highlight { color: var(--accent); }
    .metric-cell.zero { color: var(--border2); }

    /* ─── CMS TAGS ───────────────────────────────────────── */
    .cms-tag {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 0.04em;
      white-space: nowrap;
    }
    .cms-wp    { background: #e0f2fe; color: #0369a1; border: 1px solid #bae6fd; }
    .cms-shop  { background: #f0fdf4; color: #166534; border: 1px solid #bbf7d0; }
    .cms-wix   { background: #fefce8; color: #854d0e; border: 1px solid #fef08a; }
    .cms-tilda { background: #fff7ed; color: #c2410c; border: 1px solid #fed7aa; }
    .cms-react { background: #e0f9ff; color: #0e7490; border: 1px solid #a5f3fc; }
    .cms-vue   { background: #f0fdf4; color: #15803d; border: 1px solid #86efac; }
    .cms-bitrix{ background: #fff7ed; color: #ea580c; border: 1px solid #fdba74; }
    .cms-other { background: #f8fafc; color: #475569; border: 1px solid #cbd5e1; }
    .cms-ecom  { background: #f0fdf4; color: #15803d; border: 1px solid #86efac; }
    .cms-blog  { background: #faf5ff; color: #7e22ce; border: 1px solid #d8b4fe; }
    .cms-empty { color: var(--border2); font-size: 11px; }

    /* ─── SCORE CHIP ─────────────────────────────────────── */
    .score-chip {
      display: inline-block;
      width: 36px;
      height: 36px;
      line-height: 36px;
      text-align: center;
      border-radius: 50%;
      font-size: 11px;
      font-weight: 700;
    }
    .score-high   { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    .score-med    { background: #fef3c7; color: #b45309; border: 1px solid #fde68a; }
    .score-low    { background: #fee2e2; color: #b91c1c; border: 1px solid #fecaca; }
    .score-zero   { background: var(--surface2); color: var(--text-muted); border: 1px solid var(--border); }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="logo-mark">🔍</div>
    <div>
      <h1>Site Analyzer Pro</h1>
    </div>
    <span class="version-tag">v2.0</span>
  </div>

  <div class="input-section">
    <div class="input-label">
      <div class="dot"></div>
      Введите URL (по одному на строку)
    </div>
    <textarea id="linksInput" placeholder="example.com&#10;https://another-site.ru&#10;yetanothersite.net"></textarea>
  </div>

  <div class="controls">
    <button id="analyzeBtn">▶ Начать проверку</button>
    <button id="exportBtn">↓ Скачать CSV</button>
  </div>

  <div class="progress-container" id="progressBox">
    <div class="progress-bar" id="progressBar"></div>
  </div>

  <div id="statsBar"></div>

  <div class="filter-bar">
    <div class="search-wrap">
      <span class="search-icon">🔍</span>
      <input type="text" id="searchInput" placeholder="Поиск по URL или заголовку...">
    </div>
    <select id="filterSelect">
      <option value="all">Все результаты</option>
      <option value="success">✓ Полноценные</option>
      <option value="warning">~ Лендинги</option>
      <option value="danger">✗ Паркинг / Пустые</option>
      <option value="error">⚠ Ошибки</option>
    </select>
  </div>

  <div class="table-wrap">
    <table id="resultsTable">
      <thead>
        <tr>
          <th style="width:5%" data-sort="httpCode">HTTP</th>
          <th style="width:7%" data-sort="responseTime">⏱ Время</th>
          <th style="width:16%" data-sort="url">URL</th>
          <th style="width:7%" data-sort="size">Размер</th>
          <th style="width:12%" data-sort="title">Заголовок</th>
          <th style="width:5%" title="Внутренние ссылки" data-sort="links">🔗 Ссылки</th>
          <th style="width:5%" title="Скрипты + CSS + Формы" data-sort="complexity">⚙ Компл.</th>
          <th style="width:5%" title="Количество слов на странице" data-sort="wordCount">📝 Слова</th>
          <th style="width:5%" title="Изображения" data-sort="images">🖼 Img</th>
          <th style="width:5%" title="Навигационные ссылки" data-sort="navLinks">🧭 Nav</th>
          <th style="width:10%">CMS / Тип</th>
          <th style="width:12%" data-sort="verdict">Вердикт</th>
          <th style="width:6%" data-sort="score">Скор</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td colspan="13">
            <div class="empty-state">
              <div class="icon">📋</div>
              <p>Вставьте ссылки выше и нажмите «Начать проверку»</p>
            </div>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

</div>
<script src="popup.js"></script>
</body>
</html>
